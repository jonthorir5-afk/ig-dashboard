[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."sync-reddit"]
  external_node_modules = ["@supabase/supabase-js"]
  timeout = 120

[functions."sync-onlyfans"]
  external_node_modules = ["@supabase/supabase-js"]
  timeout = 120

[functions."scheduled-sync"]
  external_node_modules = ["@supabase/supabase-js", "@netlify/functions"]
  timeout = 120

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
